<div class="auth-page">
    <div class="auth-card">
      
      <div class="auth-logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="white"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/></svg>
        </div>
        <span>VACATION <em>VIBE</em></span>
      </div>
  
      <h2 class="auth-title">Create Account</h2>
      <p class="auth-subtitle">Join thousands of travelers across Israel</p>
  
      <form (ngSubmit)="addUser()">
  
        <div class="profile-upload-container">
          <div class="profile-preview" [style.backgroundImage]="'url(' + (imagePreview || 'https://via.placeholder.com/150') + ')'">
            <label for="avatar" class="upload-badge">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/>
              </svg>
            </label>
            <input type="file" id="avatar" (change)="onFileSelected($event)" accept="image/*" style="display: none;">
          </div>
          <p class="upload-text">Upload Profile Photo</p>
        </div>
  
        <div class="form-row">
          <div class="form-group">
            <label>Full Name</label>
            <div class="input-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
              <input type="text" [(ngModel)]="user.fullName" name="fullName" placeholder="John Doe">
            </div>
          </div>
  
          <div class="form-group">
            <label>Phone</label>
            <div class="input-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.18 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.29 6.29l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
              </svg>
              <input type="tel" [(ngModel)]="user.phone" name="phone" placeholder="050-0000000">
            </div>
          </div>
        </div>
  
        <div class="form-group">
          <label>Email</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
            </svg>
            <input type="email" [(ngModel)]="user.email" name="email" placeholder="john@example.com">
          </div>
        </div>
  
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            </svg>
            <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="user.password" name="password" placeholder="Min 8 characters" class="password-input">
            <button type="button" class="eye-btn" (click)="showPassword = !showPassword">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path *ngIf="!showPassword" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle *ngIf="!showPassword" cx="12" cy="12" r="3"/>
                <path *ngIf="showPassword" d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line *ngIf="showPassword" x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>
  
        <div class="form-group">
          <label>I am a</label>
          <div class="role-selector">
            <button type="button" [class.active]="user.role === 'user'" (click)="user.role = 'user'">👤 Guest</button>
            <button type="button" [class.active]="user.role === 'host'" (click)="user.role = 'host'">🏠 Host</button>
          </div>
        </div>
  
        <div class="form-group" *ngIf="user.role === 'host'">
          <label>Business Name</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <input type="text" [(ngModel)]="user.hostDetails.businessName" name="businessName" placeholder="Your property name">
          </div>
        </div>
  
        <div class="success-msg" *ngIf="successMsg">{{ successMsg }}</div>
        <div class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</div>
  
        <button type="submit" class="submit-btn" [disabled]="loading">
          <span *ngIf="!loading">Create Account</span>
          <span *ngIf="loading">Creating...</span>
        </button>
  
      </form>
  
      <p class="switch-link">Already have an account? <a routerLink="/login">Sign in</a></p>
  
    </div>
  </div>
