<div class="auth-page">
    <div class="auth-card">
  
      <div class="auth-logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="white"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/></svg>
        </div>
        <span>VACATION <em>VIBE</em></span>
      </div>
  
      <h2 class="auth-title">Welcome Back</h2>
      <p class="auth-subtitle">Sign in to your account</p>
  
      <div class="success-msg" *ngIf="successMsg">{{ successMsg }}</div>
      <div class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</div>
  
      <form (ngSubmit)="login()">
  
        <div class="form-group">
          <label>Email</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input type="email" [(ngModel)]="email" name="email" placeholder="john@example.com">
          </div>
        </div>
  
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password" placeholder="Your password">
            <button type="button" class="eye-btn" (click)="showPassword = !showPassword">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path *ngIf="!showPassword" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle *ngIf="!showPassword" cx="12" cy="12" r="3"/>
                <path *ngIf="showPassword" d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <line *ngIf="showPassword" x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>
  
        <button type="submit" class="submit-btn" [disabled]="loading">
          {{ loading ? 'Signing in...' : 'Sign In' }}
        </button>
  
      </form>
  
      <p class="auth-footer">
        Don't have an account? <a routerLink="/add-user">Join now</a>
      </p>
  
    </div>
  </div>
