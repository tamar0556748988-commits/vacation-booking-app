<nav class="navbar-container" (click)="closeAll()">
    <div class="navbar-content">
  
      <!-- Logo -->
      <a routerLink="/" class="logo-wrapper" (click)="$event.stopPropagation()">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </div>
        <div class="logo-text">
          <span class="text-primary">VACATION</span>
          <span class="text-accent">VIBE</span>
        </div>
      </a>
  
      <!-- Nav links with dropdowns -->
      <div class="nav-links">
        <div class="nav-item" *ngFor="let key of navMenuKeys">
          <button
            class="nav-btn"
            [class.open]="activeNavMenu === key"
            (click)="toggleNavMenu(key, $event)">
            {{ propertyMenus[key].label }}
            <svg class="chevron" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 1l4 4 4-4"/>
            </svg>
          </button>
          <div class="nav-dropdown" [class.open]="activeNavMenu === key" (click)="$event.stopPropagation()">
            <div class="dropdown-header">Filter by type</div>
            <div class="dropdown-item"
              *ngFor="let sub of propertyMenus[key].subtypes"
              (click)="selectSubtype(propertyMenus[key].type, sub.subCategory, $event)">
              <span class="dot" [style.background]="getSubtypeColor(key)"></span>
              {{ sub.label }}
            </div>
          </div>
        </div>
      </div>
  
      <!-- Actions -->
      <div class="nav-actions">
        <a *ngIf="user?.role === 'host' || user?.role === 'admin'"
           routerLink="/add-room"
           class="host-btn"
           (click)="$event.stopPropagation()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          Host your property
        </a>
  
        <button class="icon-btn hamburger-btn" (click)="toggleMenu($event)" aria-label="Menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="4" x2="20" y1="6" y2="6"/>
            <line x1="4" x2="20" y1="12" y2="12"/>
            <line x1="4" x2="20" y1="18" y2="18"/>
          </svg>
        </button>
  
        <a routerLink="/profile" class="user-menu" (click)="$event.stopPropagation()">
          <div class="user-avatar">
            <img *ngIf="user?.profileImage"
                 [src]="'http://localhost:3001/images/' + user.profileImage"
                 style="width:100%;height:100%;object-fit:cover;">
            <span *ngIf="user && !user?.profileImage">
              {{ user?.fullName?.charAt(0)?.toUpperCase() || user?.name?.charAt(0)?.toUpperCase() || '?' }}
            </span>
            <svg *ngIf="!user" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
        </a>
      </div>
    </div>
  
    <!-- Mobile menu -->
    <div class="mobile-menu" [class.open]="menuOpen" (click)="$event.stopPropagation()">
      <div class="mobile-item" *ngFor="let key of navMenuKeys">
        <button class="mobile-category" (click)="toggleMobileMenu(key)">
          {{ propertyMenus[key].label }}
          <svg class="chevron" [class.rotated]="activeMobileMenu === key" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 1l4 4 4-4"/>
          </svg>
        </button>
        <div class="mobile-sub" [class.open]="activeMobileMenu === key">
          <div class="mobile-sublink"
            *ngFor="let sub of propertyMenus[key].subtypes"
            (click)="selectSubtype(propertyMenus[key].type, sub.subCategory, $event)">
            <span class="dot" [style.background]="getSubtypeColor(key)"></span>
            {{ sub.label }}
          </div>
        </div>
      </div>
      <a routerLink="/profile" class="mobile-link">My Profile</a>
      <a *ngIf="user?.role === 'host' || user?.role === 'admin'"
         routerLink="/add-room" class="mobile-link mobile-host-btn">+ Host your property</a>
    </div>
  </nav>
